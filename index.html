<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>應收沖銷 · 動態新增+決策</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      background: #eef2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
      color: #1e2b3a;
    }
    .app-header {
      background: #1f2d3d;
      color: white;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .title-section h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .badge { background: #1ab394; padding: 4px 10px; border-radius: 30px; font-size: 0.75rem; }

    .main-content { flex: 1; padding: 16px 14px 20px; background: #f4f7fb; max-width: 700px; margin: 0 auto; width: 100%; }
    .page-section { display: block; }
    .page-section.hidden { display: none; }
    .card {
      background: white;
      border-radius: 28px;
      padding: 20px 18px;
      margin-bottom: 20px;
      box-shadow: 0 8px 18px rgba(0,20,40,0.06);
      border: 1px solid #e3eaf2;
    }

    .receipt-box {
      background: linear-gradient(105deg, #f0f7fc, #fff);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid #cbdde9;
    }
    .receipt-input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .receipt-input {
      font-size: 2rem;
      font-weight: 800;
      width: 180px;
      padding: 8px 12px;
      border: 2px solid #1f6eaf;
      border-radius: 40px;
      text-align: right;
    }
    .auto-btn {
      background: #1f6eaf;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .invoice-table th { text-align: left; padding: 12px 6px; border-bottom: 2px solid #d7e2ec; }
    .invoice-table td { padding: 10px 6px; border-bottom: 1px solid #e5ecf3; }
    .writeoff-input {
      width: 100%; padding: 10px 6px; border: 1.8px solid #d0dae6; border-radius: 16px; text-align: right;
    }
    .writeoff-input.error { border-color: #d1453b; background: #fff0ee; }
    .delete-btn {
      background: #fce8e6;
      border: 1px solid #e6b3ae;
      border-radius: 20px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1rem;
    }

    .summary-bar {
      margin-top: 20px; padding: 16px; background: #f0f5fa; border-radius: 24px;
      display: flex; justify-content: space-between; flex-wrap: wrap;
    }
    .add-invoice-btn {
      margin-top: 12px;
      padding: 12px 16px;
      background: #ecf3fa;
      border: 1.5px dashed #1f6eaf;
      border-radius: 40px;
      width: 100%;
      font-weight: 600;
      color: #1f6eaf;
      cursor: pointer;
      text-align: center;
    }

    /* 決策卡片 */
    .decision-card {
      background: #f9fcff;
      border-radius: 24px;
      padding: 18px 16px;
      margin: 20px 0 10px;
      border: 1.5px solid #d3e2f0;
    }
    .step-badge {
      background: #d4e3fa;
      color: #194a77;
      padding: 6px 16px;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .question-box { font-size: 1.3rem; font-weight: 650; margin-bottom: 16px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .btn {
      flex: 1 1 0; min-width: 120px; background: white; border: 1.8px solid #c3d6e8;
      color: #19415f; font-weight: 700; font-size: 1.1rem; padding: 14px 8px;
      border-radius: 60px; cursor: pointer; text-align: center;
    }
    .btn-primary { background: #1f6eaf; border-color: #165a96; color: white; }
    .btn-warning { background: #fef5e3; border-color: #e2c28b; color: #7a5500; }
    .toolbar { display: flex; gap: 12px; margin-top: 16px; }
    .tool-btn {
      background: rgba(255,255,255,0.7); border: 1.5px solid #bed0e2;
      padding: 10px 16px; border-radius: 48px; font-weight: 600; flex: 1; text-align: center; cursor: pointer;
    }

    /* 立帳 */
    .entry-header { display: flex; gap: 8px; margin-bottom: 8px; font-weight: 700; }
    .entry-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .entry-row input { padding: 14px 12px; border: 1.8px solid #d0dae6; border-radius: 18px; flex:1; }
    .entry-row input:first-child { flex:2; }

    .bottom-nav {
      background: white; display: flex; padding: 10px 12px 14px; border-top: 1px solid #d9e2ec; gap: 8px;
    }
    .nav-item {
      flex: 1; text-align: center; padding: 8px 0; border-radius: 40px; font-weight: 600;
      color: #4e6e85; cursor: pointer; background: transparent; border: none;
    }
    .nav-item.active { background: #1f2d3d; color: white; }
    .footer-note { text-align: center; font-size: 0.75rem; color: #6b8a9c; padding: 12px; }

    @media (max-width: 480px) {
      .invoice-table th:nth-child(3), .invoice-table td:nth-child(3) { display: none; }
      .entry-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="title-section">
    <h1>🧾 沖銷·動態新增</h1>
    <span class="badge">v5.0 可擴充</span>
  </div>
  <select id="currentUserRole" style="padding:8px; border-radius:40px;">
    <option>會計專員</option><option>總帳會計</option>
  </select>
</header>

<div class="main-content">
  <div id="page-reconcile" class="page-section">
    <div class="receipt-box">
      <div class="receipt-input-area">
        <label>💰 收款金額</label>
        <input type="number" id="receiptAmount" class="receipt-input" value="12500" min="0" step="100">
        <button class="auto-btn" onclick="autoAllocate()">⚡ 自動分配</button>
      </div>
      <div style="margin-top:10px;"><input type="date" id="receiptDate" value="2026-04-13" style="border-radius:40px; padding:6px;"></div>
    </div>

    <div class="card">
      <h3>📄 待沖銷應收帳款</h3>
      <table class="invoice-table">
        <thead><tr><th>發票號碼</th><th>應收金額</th><th>已沖金額</th><th>未沖餘額</th><th>本次沖銷</th><th></th></tr></thead>
        <tbody id="invoiceBody"></tbody>
      </table>
      <!-- 新增發票按鈕 -->
      <div class="add-invoice-btn" onclick="addNewInvoice()">
        ➕ 新增應收票據 / 發票
      </div>

      <div class="summary-bar">
        <div><span>📊 總沖銷</span><br><span id="totalWriteoffDisplay">0</span></div>
        <div><span>⏳ 剩餘未分配</span><br><span id="remainingDisplay">0</span><span id="allocationWarning"></span></div>
      </div>
      <div id="globalErrorMsg" style="color:#d1453b; min-height:28px;"></div>
    </div>

    <!-- 決策流程區塊 -->
    <div class="decision-card">
      <div style="display:flex; justify-content:space-between;">
        <span class="step-badge" id="stepBadge">⚡ 步驟 1 / 5</span>
        <span style="font-size:0.8rem; color:#1f6eaf;" id="decisionPath"></span>
      </div>
      <div class="question-box" id="question">🔍 是否能明確辨識付款人？</div>
      <div id="buttons" class="btn-row"></div>
      <div class="toolbar" id="toolbarArea"></div>
      <div id="resultMessage" style="margin-top:16px; padding:12px; border-radius:20px; background:#eaf3e6; display:none;"></div>
    </div>

    <div style="display:flex; gap:12px; margin-top:16px;">
      <button class="btn" onclick="resetAllocation()">🔄 清除分配</button>
      <button class="btn btn-primary" id="saveReconcileBtn" onclick="saveReconcile()">✔ 儲存沖銷分錄</button>
    </div>
  </div>

  <!-- 立帳頁 -->
  <div id="page-journal" class="page-section hidden">
    <div class="card">
      <h3>📝 新增分錄</h3>
      <div style="margin-bottom:16px;"><input type="date" id="txnDate" style="padding:12px; border-radius:30px;"></div>
      <div class="entry-header"><span style="flex:2;">會計科目</span><span style="flex:1;">借方</span><span style="flex:1;">貸方</span><span style="width:52px;"></span></div>
      <div id="entryRowsContainer"></div>
      <button class="btn" onclick="addEntryRow()" style="margin:12px 0;">➕ 新增明細</button>
      <div class="summary-bar"><span>借方：<span id="sumDebit">0</span></span><span>貸方：<span id="sumCredit">0</span></span><span id="balanceWarning" style="color:#d1453b;"></span></div>
      <button id="saveEntryBtn" class="btn btn-primary" onclick="saveTransaction()" disabled style="width:100%;">✔ 儲存分錄</button>
    </div>
  </div>

  <!-- 總帳頁 -->
  <div id="page-ledger" class="page-section hidden">
    <div class="card">
      <h3>📚 總帳</h3>
      <div class="table-wrapper" style="overflow-x:auto;"><table><thead><tr><th>傳票號</th><th>日期</th><th>科目</th><th>借方</th><th>貸方</th><th>製單</th></tr></thead>
        <tbody id="ledgerTableBody"></tbody></table>
      </div>
    </div>
  </div>

  <!-- 稽核頁 -->
  <div id="page-audit" class="page-section hidden">
    <div class="card">
      <h3>🛡️ 稽核軌跡</h3>
      <ul class="audit-list" id="auditLogList" style="list-style:none; padding:0;"></ul>
    </div>
  </div>

  <div class="footer-note">
    🧑‍⚕️ 營養師 李亮頡 研究開發 for 泡泡 · 2026/04/13
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" data-page="reconcile">🧾 沖帳</button>
  <button class="nav-item" data-page="journal">📝 立帳</button>
  <button class="nav-item" data-page="ledger">📚 總帳</button>
  <button class="nav-item" data-page="audit">📋 稽核</button>
</div>

<script>
  (function(){
    // ---------- 全域狀態 ----------
    // 發票資料 (可動態新增)
    let invoices = [
      { number: 'INV-2403-01', amount: 8200, writtenOff: 0 },
      { number: 'INV-2403-15', amount: 4300, writtenOff: 0 },
      { number: 'INV-2403-22', amount: 6000, writtenOff: 2000 },
      { number: 'INV-2404-05', amount: 3500, writtenOff: 0 }
    ];
    let currentWriteoffs = invoices.map(() => 0);
    
    // 決策狀態
    let step = 0;
    const STEP_MAP = {0:'辨識付款人',1:'單張核對',2:'多張合計',3:'差額分析',4:'少收',5:'多收'};
    let isFinished = false, isUnknown = false, finishMessage = '';

    let transactions = JSON.parse(localStorage.getItem("erp_txns") || "[]");
    let auditLogs = JSON.parse(localStorage.getItem("erp_logs") || "[]");
    let currentRows = [];

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('txnDate').value = today;
    document.getElementById('receiptDate').value = today;

    function logAction(action) {
      const role = document.getElementById('currentUserRole').value;
      const time = new Date().toLocaleString('zh-TW', { hour12: false });
      auditLogs.unshift({ time, role, action });
      localStorage.setItem("erp_logs", JSON.stringify(auditLogs));
      renderAuditLogs();
    }

    // ----- 沖帳核心 -----
    function getReceiptAmount() { let v = parseFloat(receiptInput.value); return isNaN(v)||v<0 ? 0 : v; }
    function getRemaining(inv) { return Math.max(0, inv.amount - inv.writtenOff); }
    const receiptInput = document.getElementById('receiptAmount');
    const invoiceBody = document.getElementById('invoiceBody');
    const totalWOSpan = document.getElementById('totalWriteoffDisplay');
    const remainingSpan = document.getElementById('remainingDisplay');
    const warningSpan = document.getElementById('allocationWarning');
    const errorMsg = document.getElementById('globalErrorMsg');
    const saveBtn = document.getElementById('saveReconcileBtn');

    // 同步 currentWriteoffs 長度與 invoices 一致
    function syncWriteoffsLength() {
      if (currentWriteoffs.length < invoices.length) {
        for (let i = currentWriteoffs.length; i < invoices.length; i++) currentWriteoffs.push(0);
      } else if (currentWriteoffs.length > invoices.length) {
        currentWriteoffs = currentWriteoffs.slice(0, invoices.length);
      }
    }

    function renderReconcileTable() {
      syncWriteoffsLength();
      let html = '', totalWO = 0;
      invoices.forEach((inv, idx) => {
        const rem = getRemaining(inv);
        const val = currentWriteoffs[idx] || 0;
        totalWO += val;
        const over = val > rem;
        html += `<tr>
          <td><input type="text" value="${inv.number}" style="width:100%; border:1px solid #d0dae6; border-radius:14px; padding:6px;" onchange="updateInvoiceNumber(${idx}, this.value)"></td>
          <td><input type="number" value="${inv.amount}" min="0" step="0.01" style="width:100%; border:1px solid #d0dae6; border-radius:14px; padding:6px;" onchange="updateInvoiceAmount(${idx}, this.value)"></td>
          <td>$${inv.writtenOff.toLocaleString()}</td>
          <td>$${rem.toLocaleString()}</td>
          <td><input type="number" class="writeoff-input ${over?'error':''}" id="wo_${idx}" value="${val}" min="0" max="${rem}" step="0.01" onchange="updateWO(${idx}, this.value)"></td>
          <td><button class="delete-btn" onclick="deleteInvoice(${idx})">🗑️</button></td>
        </tr>`;
      });
      invoiceBody.innerHTML = html;
      totalWOSpan.innerText = '$' + totalWO.toLocaleString(undefined, {minimumFractionDigits:2});
      const receipt = getReceiptAmount();
      const remaining = receipt - totalWO;
      remainingSpan.innerText = (remaining>=0?'$':'-$') + Math.abs(remaining).toLocaleString(undefined, {minimumFractionDigits:2});
      let err = '';
      if (totalWO > receipt) err = '❌ 總沖銷超過收款';
      else if (invoices.some((inv,i)=> currentWriteoffs[i] > getRemaining(inv))) err = '❌ 單筆超限';
      errorMsg.innerText = err;
      warningSpan.innerHTML = remaining>0 ? `📌 尚餘 $${remaining.toLocaleString()}` : (Math.abs(remaining)<0.001?'✅ 全額分配':'');
      saveBtn.disabled = (totalWO <= 0 || totalWO > receipt || err !== '');
      renderDecisionUI();
    }

    // 新增發票
    window.addNewInvoice = function() {
      invoices.push({ number: 'NEW-' + (invoices.length+1), amount: 0, writtenOff: 0 });
      currentWriteoffs.push(0);
      renderReconcileTable();
    };

    // 刪除發票
    window.deleteInvoice = function(idx) {
      if (invoices.length <= 1) { alert('至少保留一筆發票'); return; }
      invoices.splice(idx, 1);
      currentWriteoffs.splice(idx, 1);
      renderReconcileTable();
    };

    // 編輯發票號碼
    window.updateInvoiceNumber = function(idx, value) {
      invoices[idx].number = value;
      renderReconcileTable();
    };

    // 編輯應收金額
    window.updateInvoiceAmount = function(idx, value) {
      let v = parseFloat(value) || 0;
      if (v < 0) v = 0;
      invoices[idx].amount = v;
      if (invoices[idx].writtenOff > v) invoices[idx].writtenOff = v;
      // 若本次沖銷超過新餘額，自動修正
      if (currentWriteoffs[idx] > getRemaining(invoices[idx])) {
        currentWriteoffs[idx] = getRemaining(invoices[idx]);
      }
      renderReconcileTable();
    };

    window.updateWO = (idx, val) => {
      let v = parseFloat(val)||0; if(v<0) v=0;
      const max = getRemaining(invoices[idx]); if(v>max) v=max;
      currentWriteoffs[idx] = v;
      renderReconcileTable();
    };
    window.autoAllocate = () => {
      let receipt = getReceiptAmount();
      currentWriteoffs = invoices.map(()=>0);
      let remain = receipt;
      for(let i=0; i<invoices.length; i++) {
        const avail = getRemaining(invoices[i]);
        if(avail<=0) continue;
        const alloc = Math.min(avail, remain);
        currentWriteoffs[i] = alloc;
        remain -= alloc;
        if(remain<=0) break;
      }
      renderReconcileTable();
    };
    window.resetAllocation = () => { currentWriteoffs = invoices.map(()=>0); renderReconcileTable(); };

    // ----- 決策流程 -----
    const qEl = document.getElementById('question');
    const buttonsDiv = document.getElementById('buttons');
    const toolbarDiv = document.getElementById('toolbarArea');
    const resultMsgDiv = document.getElementById('resultMessage');
    const stepBadge = document.getElementById('stepBadge');
    const decisionPath = document.getElementById('decisionPath');

    function renderDecisionUI() {
      buttonsDiv.innerHTML = ''; toolbarDiv.innerHTML = '';
      resultMsgDiv.style.display = 'none';
      const totalWO = currentWriteoffs.reduce((s,v)=>s+v,0);
      const receipt = getReceiptAmount();

      if (isUnknown) {
        qEl.innerText = '⚠️ 無法辨識付款人';
        stepBadge.innerText = '⚠️ 暫收款';
        toolbarDiv.innerHTML = `<button class="tool-btn" onclick="resetDecision()">↻ 重新決策</button>`;
        resultMsgDiv.style.display = 'block';
        resultMsgDiv.innerHTML = '→ 建議列入「暫收款」並查明來源';
        return;
      }
      if (isFinished) {
        qEl.innerText = '✅ 沖帳決策完成';
        stepBadge.innerText = '✅ 決策結束';
        toolbarDiv.innerHTML = `<button class="tool-btn" onclick="resetDecision()">🔄 重新決策</button>`;
        resultMsgDiv.style.display = 'block';
        resultMsgDiv.innerHTML = finishMessage;
        return;
      }

      let stepText='', stepNum=1;
      if(step===0){stepText='① 付款人辨識';} else if(step===1){stepText='② 單張核對';stepNum=2;} else if(step===2){stepText='③ 多張合計';stepNum=3;} else if(step===3){stepText='④ 差額分析';stepNum=4;} else if(step===4){stepText='⑤ 少收';stepNum=5;} else if(step===5){stepText='⑤ 多收';stepNum=5;}
      stepBadge.innerText = `📌 ${stepText} · 步驟 ${stepNum}/5`;
      decisionPath.innerText = `🔄 當前: ${STEP_MAP[step]}`;

      if(step===0){
        qEl.innerHTML='🔍 是否能明確辨識付款人？';
        buttonsDiv.innerHTML=`<button class="btn btn-primary" onclick="nextStep(1)">✔ 可以</button><button class="btn btn-warning" onclick="markUnknown()">❓ 不行</button>`;
      } else if(step===1){
        qEl.innerHTML=`💰 收款 $${receipt.toLocaleString()} 是否等於某一張發票？<br><small>目前核銷總額 $${totalWO.toLocaleString()}</small>`;
        buttonsDiv.innerHTML=`<button class="btn btn-primary" onclick="finishDecision('✔ 單筆沖帳完成')">✅ 是</button><button class="btn" onclick="nextStep(2)">🔁 否</button>`;
      } else if(step===2){
        qEl.innerHTML=`🧮 是否為多張發票加總？<br><small>核銷合計 $${totalWO.toLocaleString()}</small>`;
        buttonsDiv.innerHTML=`<button class="btn btn-primary" onclick="finishDecision('✔ 多筆合併沖帳完成')">📑 是</button><button class="btn" onclick="nextStep(3)">🔀 否</button>`;
      } else if(step===3){
        const diff = totalWO - receipt;
        const diffText = diff>0 ? `多收 $${diff.toLocaleString()}` : (diff<0 ? `少收 $${Math.abs(diff).toLocaleString()}` : '相符');
        qEl.innerHTML = `⚖️ 是否有差額？ (目前${diffText})`;
        buttonsDiv.innerHTML=`<button class="btn btn-warning" onclick="nextStep(4)">📉 少收</button><button class="btn" onclick="nextStep(5)">📈 多收</button>`;
      } else if(step===4){
        qEl.innerHTML='📝 少收處理';
        buttonsDiv.innerHTML=`<button class="btn btn-primary" onclick="finishDecision('📌 記錄折讓/未收款')">📎 確認</button>`;
      } else if(step===5){
        qEl.innerHTML='💵 多收處理';
        buttonsDiv.innerHTML=`<button class="btn btn-primary" onclick="finishDecision('📌 轉列預收款')">📥 確認</button>`;
      }

      let toolbarHtml = (step>0?`<button class="tool-btn" onclick="goBack()">← 上一步</button>`:'<span></span>') + `<button class="tool-btn" style="color:#b13e32;" onclick="resetDecision()">⟲ 重置決策</button>`;
      toolbarDiv.innerHTML = toolbarHtml;
    }

    window.nextStep = (n) => { if(!isFinished&&!isUnknown){ step=n; renderDecisionUI(); } };
    window.finishDecision = (msg) => { isFinished=true; finishMessage=msg; renderDecisionUI(); };
    window.markUnknown = () => { isUnknown=true; renderDecisionUI(); };
    window.goBack = () => {
      if(step===1) step=0; else if(step===2) step=1; else if(step===3) step=2; else if(step===4||step===5) step=3;
      renderDecisionUI();
    };
    window.resetDecision = () => { step=0; isFinished=false; isUnknown=false; finishMessage=''; renderDecisionUI(); };

    receiptInput.addEventListener('input', () => renderReconcileTable());

    window.saveReconcile = function() {
      const total = currentWriteoffs.reduce((s,v)=>s+v,0);
      if (total <=0 || total > getReceiptAmount()) return;
      invoices.forEach((inv,i)=> inv.writtenOff += currentWriteoffs[i]);
      const txn = {
        id: 'RCV-' + Math.random().toString(36).substr(2,6).toUpperCase(),
        date: document.getElementById('receiptDate').value,
        creatorRole: document.getElementById('currentUserRole').value,
        entries: [{ account:'銀行存款', debit:total, credit:0 },{ account:'應收帳款', debit:0, credit:total }]
      };
      transactions.unshift(txn);
      localStorage.setItem("erp_txns", JSON.stringify(transactions));
      logAction(`✅ 沖帳 ${txn.id} ｜ $${total.toLocaleString()}`);
      alert('沖銷分錄已儲存');
      currentWriteoffs = invoices.map(()=>0);
      renderReconcileTable();
      renderLedger();
      resetDecision();
    };

    // ----- 立帳 -----
    function renderEntryRows() {
      const cont = document.getElementById('entryRowsContainer');
      let html = '';
      currentRows.forEach((r,i)=>{
        html+=`<div class="entry-row"><input placeholder="科目" value="${r.account}" onchange="updateRow(${i},'account',this.value)"><input type="number" placeholder="借方" value="${r.debit||''}" onchange="updateRow(${i},'debit',this.value)"><input type="number" placeholder="貸方" value="${r.credit||''}" onchange="updateRow(${i},'credit',this.value)"><span class="delete-btn" onclick="removeRow(${i})">🗑️</span></div>`;
      });
      cont.innerHTML = html || '<div>點擊新增</div>';
      calcTotals();
    }
    window.addEntryRow = ()=> { currentRows.push({account:'',debit:0,credit:0}); renderEntryRows(); };
    window.removeRow = (i)=> { if(currentRows.length<=2) return alert('至少兩筆'); currentRows.splice(i,1); renderEntryRows(); };
    window.updateRow = (i, field, val) => {
      if(field==='account') currentRows[i].account = val;
      else { let v=parseFloat(val)||0; if(field==='debit'&&v>0) currentRows[i].credit=0; if(field==='credit'&&v>0) currentRows[i].debit=0; currentRows[i][field]=v; }
      renderEntryRows();
    };
    function calcTotals() {
      let deb=0,cred=0; currentRows.forEach(r=>{ deb+=r.debit; cred+=r.credit; });
      document.getElementById('sumDebit').innerText=deb.toLocaleString();
      document.getElementById('sumCredit').innerText=cred.toLocaleString();
      const ok = (deb>0 && deb===cred);
      document.getElementById('saveEntryBtn').disabled = !ok;
      document.getElementById('balanceWarning').innerText = ok?'':'⚠️ 不平衡';
    }
    window.saveTransaction = ()=>{
      let deb=0,cred=0; currentRows.forEach(r=>{ deb+=r.debit; cred+=r.credit; });
      if(deb!==cred||deb===0) return;
      const txn = {
        id: 'V-'+Math.random().toString(36).substr(2,8).toUpperCase(),
        date: document.getElementById('txnDate').value,
        creatorRole: document.getElementById('currentUserRole').value,
        entries: currentRows.filter(r=>r.account.trim()).map(r=>({account:r.account, debit:r.debit, credit:r.credit}))
      };
      transactions.unshift(txn); localStorage.setItem("erp_txns", JSON.stringify(transactions));
      logAction(`📝 傳票 ${txn.id} | $${deb}`);
      alert('分錄儲存'); currentRows=[]; addEntryRow(); addEntryRow(); renderLedger();
    };

    function renderLedger() {
      const tbody = document.getElementById('ledgerTableBody');
      if(!transactions.length) { tbody.innerHTML='<tr><td colspan="6">無</td></tr>'; return; }
      let html='';
      transactions.forEach(txn=>{ txn.entries.forEach((e,idx)=>{ html+=`<tr>${idx===0?`<td rowspan="${txn.entries.length}">${txn.id}</td><td rowspan="${txn.entries.length}">${txn.date}</td>`:''}<td>${e.account}</td><td>${e.debit?e.debit.toLocaleString():''}</td><td>${e.credit?e.credit.toLocaleString():''}</td>${idx===0?`<td rowspan="${txn.entries.length}">${txn.creatorRole}</td>`:''}</tr>`; }); });
      tbody.innerHTML=html;
    }
    function renderAuditLogs() {
      document.getElementById('auditLogList').innerHTML = auditLogs.map(l=>`<li><span style="background:#1f2d3d;color:white;padding:2px 10px;border-radius:20px;">${l.time}</span> <b>${l.role}</b> ${l.action}</li>`).join('');
    }

    // 導航
    document.querySelectorAll('.nav-item').forEach(btn=>{ btn.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const page = btn.dataset.page;
      document.querySelectorAll('.page-section').forEach(p=>p.classList.add('hidden'));
      document.getElementById(`page-${page}`).classList.remove('hidden');
      if(page==='ledger') renderLedger();
      if(page==='audit') renderAuditLogs();
      if(page==='reconcile') renderReconcileTable();
    });});

    function init() {
      if(auditLogs.length===0) logAction('📱 系統啟動');
      currentRows = []; addEntryRow(); addEntryRow();
      autoAllocate();
      renderLedger(); renderAuditLogs();
    }
    init();
    window.renderLedger = renderLedger;
  })();
</script>
</body>
</html>
